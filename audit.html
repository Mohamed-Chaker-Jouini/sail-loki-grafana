<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAIL — Drift Audit Log</title>
<style>
  :root {
    /* Classic Enterprise Light Mode Palette */
    --bg:       #e9ecef;
    --surface:  #ffffff;
    --border:   #ced4da;
    --text:     #212529;
    --muted:    #495057;
    --green:    #198754;
    --red:      #dc3545;
    --orange:   #d35400;
    --blue:     #0056b3;
    --purple:   #6f42c1;
    --yellow:   #ffc107;
    --header-bg:#f8f9fa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    /* The manager-approved font stack */
    font-family: Arial, Helvetica, sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--blue);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--blue);
    border-radius: 0; /* Square! */
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: bold; color: #fff;
  }
  .logo-text h1 { font-size: 18px; font-weight: bold; color: var(--blue); }
  .logo-text p  { font-size: 12px; color: var(--muted); }

  .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  /* ── Buttons ── */
  button {
    padding: 6px 12px;
    border-radius: 0; /* Square! */
    border: 1px solid var(--border);
    background: var(--header-bg);
    color: var(--text);
    cursor: pointer;
    font-size: 12px;
    font-weight: bold;
    transition: background .15s, border-color .15s;
    white-space: nowrap;
  }
  button:hover { background: #e2e6ea; border-color: #dae0e5; }
  button.primary {
    background: var(--blue);
    border-color: #004085;
    color: #fff;
  }
  button.primary:hover { background: #004085; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 16px;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0;
    padding: 10px 16px;
    min-width: 130px;
    box-shadow: 2px 2px 0px rgba(0,0,0,0.05); /* Rigid drop shadow */
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: bold; }
  .stat-value { font-size: 22px; font-weight: bold; margin-top: 2px; }

  /* ── Filters ── */
  .filters {
    padding: 12px 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
  }
  input, select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0; /* Square! */
    color: var(--text);
    padding: 6px 10px;
    font-size: 12px;
    outline: none;
  }
  input:focus, select:focus { border-color: var(--blue); }
  input[type="text"] { width: 220px; }
  input[type="date"] { width: 140px; }
  .filter-label { font-size: 12px; font-weight: bold; color: var(--text); margin-right: 2px; }

  /* ── Table ── */
  .table-wrap {
    padding: 24px;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 12px;
  }
  th {
    text-align: left;
    padding: 10px 12px;
    background: var(--header-bg);
    border-bottom: 2px solid var(--border);
    border-right: 1px solid var(--border);
    color: var(--text);
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  th:last-child { border-right: none; }
  th:hover { background: #e2e6ea; }
  th .sort-arrow { margin-left: 4px; color: var(--muted); }
  th.sorted .sort-arrow { color: var(--blue); font-weight: bold; }

  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    vertical-align: top;
  }
  td:last-child { border-right: none; }
  tr:nth-child(even) td { background: #fdfdfd; } /* Zebra striping */
  tr:hover td { background: #f1f3f5; }

  /* ── Badges ── */
  .badge {
    display: inline-block;
    padding: 3px 6px;
    border-radius: 0; /* Square! */
    font-size: 10px;
    font-weight: bold;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .badge-drift  { background: var(--red);   color: #fff; border: 1px solid #bd2130; }
  .badge-clean  { background: var(--green); color: #fff; border: 1px solid #146c43; }
  .badge-zone   { background: #e9ecef;      color: var(--text); border: 1px solid var(--border); margin-right: 3px; }
  .badge-new-zone { background: var(--orange); color: #fff; border: 1px solid #b33900; }

  /* ── Delta cell ── */
  .delta-zone { margin-bottom: 8px; }
  .delta-zone:last-child { margin-bottom: 0; }
  .delta-zone-name {
    font-size: 11px;
    font-weight: bold;
    color: var(--text);
    text-decoration: underline;
    margin-bottom: 3px;
  }
  .ip-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .ip-chip {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 0;
    font-family: "Courier New", Courier, monospace;
    font-weight: bold;
  }
  .ip-chip.add    { background: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
  .ip-chip.remove { background: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }

  /* ── Expandable row ── */
  .expand-btn {
    background: none;
    border: none;
    color: var(--blue);
    cursor: pointer;
    padding: 0;
    font-size: 11px;
  }
  .expand-btn:hover { background: none; text-decoration: underline; }
  .detail-row { display: none; }
  .detail-row.open { display: table-row; }
  .detail-cell {
    padding: 16px 24px;
    background: #f8f9fa !important;
    border-bottom: 2px solid var(--border);
  }
  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .detail-item label { font-size: 11px; font-weight: bold; color: var(--text); display: block; margin-bottom: 3px; }
  .detail-item span  { font-size: 12px; font-family: "Courier New", Courier, monospace; background: #fff; padding: 2px 4px; border: 1px solid #dee2e6; display: inline-block;}

  /* ── Empty / loading ── */
  .empty {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* ── Pagination ── */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    padding: 0 24px 12px;
    flex-wrap: wrap;
  }
  .pagination span { color: var(--text); font-size: 12px; font-weight: bold; }
  .page-info { min-width: 120px; text-align: center; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: #343a40;
    color: #fff;
    border: 1px solid #212529;
    border-radius: 0;
    padding: 12px 18px;
    font-size: 12px;
    font-weight: bold;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    z-index: 999;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">S</div>
    <div class="logo-text">
      <h1>SAIL Drift Audit Log</h1>
      <p>SRX / Morpheus Reconciliation History</p>
    </div>
  </div>
  <div class="header-actions">
    <span id="last-refresh" style="color:var(--muted);font-size:11px;font-weight:bold;"></span>
    <button onclick="loadHistory()">↻ Refresh</button>
    <button onclick="exportCSV()" class="primary">⬇ Export CSV</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-label">Total Runs</div>
    <div class="stat-value" id="stat-total">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Drift Events</div>
    <div class="stat-value" id="stat-drift" style="color:var(--red)">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">IPs Added</div>
    <div class="stat-value" id="stat-added" style="color:var(--green)">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">IPs Removed</div>
    <div class="stat-value" id="stat-removed" style="color:var(--orange)">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">New Zones</div>
    <div class="stat-value" id="stat-zones" style="color:var(--purple)">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Retention</div>
    <div class="stat-value" id="stat-retention" style="font-size:14px;padding-top:4px;color:var(--text)">—</div>
  </div>
</div>

<div class="filters">
  <span class="filter-label">Search:</span>
  <input type="text"   id="f-search"   placeholder="IP, zone, or run ID…" oninput="applyFilters()">
  <span class="filter-label">Type:</span>
  <select id="f-type" onchange="applyFilters()">
    <option value="">All runs</option>
    <option value="drift">Drift only</option>
    <option value="clean">Clean only</option>
  </select>
  <span class="filter-label">Zone:</span>
  <select id="f-zone" onchange="applyFilters()">
    <option value="">All zones</option>
  </select>
  <span class="filter-label">From:</span>
  <input type="date" id="f-from" onchange="applyFilters()">
  <span class="filter-label">To:</span>
  <input type="date" id="f-to"   onchange="applyFilters()">
  <button onclick="clearFilters()">✕ Clear</button>
</div>

<br>
<div class="pagination" id="pag-top"></div>

<div class="table-wrap" style="padding-top: 0;">
  <table id="audit-table">
    <thead>
      <tr>
        <th data-col="ts"       onclick="sortBy('ts')">Timestamp <span class="sort-arrow">↕</span></th>
        <th data-col="run_id"   onclick="sortBy('run_id')">Run ID <span class="sort-arrow">↕</span></th>
        <th data-col="status"   onclick="sortBy('status')">Status <span class="sort-arrow">↕</span></th>
        <th>Zones Affected</th>
        <th>Changes</th>
        <th data-col="duration" onclick="sortBy('duration')">Duration <span class="sort-arrow">↕</span></th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="audit-body"></tbody>
  </table>
  <div id="empty-state" class="empty" style="display:none">
    <div class="empty-icon">📋</div>
    <div>No audit records match the current filters.</div>
  </div>
</div>

<div class="pagination" id="pag-bottom"></div>
<div id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let allEntries   = [];
let filtered     = [];
let sortCol      = 'ts';
let sortDir      = -1;          // -1 = desc (newest first)
let currentPage  = 1;
const PAGE_SIZE  = 25;
let openRows     = new Set();

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function loadHistory() {
  try {
    const [histRes, healthRes] = await Promise.all([
      fetch('/history'),
      fetch('/health'),
    ]);
    allEntries = await histRes.json();
    const health = await healthRes.json();

    document.getElementById('stat-retention').textContent =
      `${allEntries.length} / ${health.max_history}`;
    document.getElementById('last-refresh').textContent =
      'UPDATED: ' + new Date().toLocaleTimeString().toUpperCase();

    populateZoneFilter();
    computeStats();
    applyFilters();
  } catch (e) {
    showToast('Failed to load history: ' + e.message);
  }
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function computeStats() {
  let drifts = 0, added = 0, removed = 0, newZones = 0;
  for (const e of allEntries) {
    if (e.changed) drifts++;
    const d = e.delta_map || {};
    for (const z of Object.values(d)) {
      added   += (z.to_add    || []).length;
      removed += (z.to_remove || []).length;
    }
    if (e.new_zones && e.new_zones.length) newZones += e.new_zones.length;
  }
  document.getElementById('stat-total'  ).textContent = allEntries.length;
  document.getElementById('stat-drift'  ).textContent = drifts;
  document.getElementById('stat-added'  ).textContent = added;
  document.getElementById('stat-removed').textContent = removed;
  document.getElementById('stat-zones'  ).textContent = newZones;
}

// ── Zone filter population ────────────────────────────────────────────────────
function populateZoneFilter() {
  const zones = new Set();
  for (const e of allEntries) {
    for (const z of Object.keys(e.delta_map || {})) zones.add(z);
  }
  const sel = document.getElementById('f-zone');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All zones</option>';
  for (const z of [...zones].sort()) {
    const o = document.createElement('option');
    o.value = z; o.textContent = z;
    if (z === cur) o.selected = true;
    sel.appendChild(o);
  }
}

// ── Filters ───────────────────────────────────────────────────────────────────
function applyFilters() {
  const search = document.getElementById('f-search').value.toLowerCase();
  const type   = document.getElementById('f-type').value;
  const zone   = document.getElementById('f-zone').value;
  const from   = document.getElementById('f-from').value;
  const to     = document.getElementById('f-to').value;

  filtered = allEntries.filter(e => {
    if (type === 'drift' && !e.changed) return false;
    if (type === 'clean' &&  e.changed) return false;
    if (zone && !Object.keys(e.delta_map || {}).includes(zone)) return false;

    if (from) {
      const d = new Date(e.ts * 1000).toISOString().slice(0, 10);
      if (d < from) return false;
    }
    if (to) {
      const d = new Date(e.ts * 1000).toISOString().slice(0, 10);
      if (d > to) return false;
    }
    if (search) {
      const hay = JSON.stringify(e).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  sortFiltered();
  currentPage = 1;
  render();
}

function clearFilters() {
  ['f-search','f-from','f-to'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-type').value = '';
  document.getElementById('f-zone').value = '';
  applyFilters();
}

// ── Sort ──────────────────────────────────────────────────────────────────────
function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  document.querySelector(`th[data-col="${col}"]`)?.classList.add('sorted');
  sortFiltered();
  render();
}

function sortFiltered() {
  filtered.sort((a, b) => {
    let av = a[sortCol] ?? '', bv = b[sortCol] ?? '';
    if (typeof av === 'string') av = av.toLowerCase(), bv = bv.toLowerCase();
    return av < bv ? sortDir : av > bv ? -sortDir : 0;
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const tbody  = document.getElementById('audit-body');
  const empty  = document.getElementById('empty-state');
  const start  = (currentPage - 1) * PAGE_SIZE;
  const page   = filtered.slice(start, start + PAGE_SIZE);

  tbody.innerHTML = '';

  if (!filtered.length) {
    empty.style.display = 'block';
    renderPagination();
    return;
  }
  empty.style.display = 'none';

  for (const e of page) {
    const rid    = e.run_id || '—';
    const ts     = e.ts ? new Date(e.ts * 1000).toLocaleString() : '—';
    const dur    = e.duration_s != null ? e.duration_s.toFixed(1) + 's' : '—';
    const drift  = e.changed;
    const dmap   = e.delta_map || {};
    let nz = e.new_zones || [];
    if (typeof nz === 'string') {
      try { 
        // Convert Python/Ansible single-quote strings to valid JSON double-quotes
        nz = JSON.parse(nz.replace(/'/g, '"')); 
      } catch(err) { 
        nz = []; 
      }
    }
    if (!Array.isArray(nz)) nz = [];

    // Zones affected
    const zonesHtml = Object.keys(dmap).map(z => {
      const hasChange = (dmap[z].to_add?.length || 0) + (dmap[z].to_remove?.length || 0) > 0;
      return `<span class="badge ${hasChange ? 'badge-zone' : ''}" style="${hasChange?'':'color:var(--muted);background:transparent;border:none'}">${z}</span>`;
    }).join('') || '<span style="color:var(--muted)">—</span>';

    // Changes summary
    let changesHtml = '';
    for (const [z, d] of Object.entries(dmap)) {
      const adds = d.to_add || [], rems = d.to_remove || [];
      if (!adds.length && !rems.length) continue;
      changesHtml += `<div class="delta-zone">
        <div class="delta-zone-name">${z}</div>
        <div class="ip-list">
          ${adds.map(ip => `<span class="ip-chip add">+${ip}</span>`).join('')}
          ${rems.map(ip => `<span class="ip-chip remove">-${ip}</span>`).join('')}
        </div>
      </div>`;
    }
    if (nz.length) {
      changesHtml += nz.map(z => `<span class="badge badge-new-zone">NEW ZONE: ${z}</span>`).join(' ');
    }
    if (!changesHtml) changesHtml = '<span style="color:var(--muted);font-size:12px;font-style:italic;">No changes recorded</span>';

    const rowId    = `row-${e.ts}-${rid}`.replace(/[^a-z0-9-]/gi, '-');
    const detailId = `det-${rowId}`;
    const isOpen   = openRows.has(rowId);

    // Main row
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="white-space:nowrap;font-family:'Courier New', Courier, monospace;font-size:12px">${ts}</td>
      <td style="font-family:'Courier New', Courier, monospace;font-size:12px;color:var(--text)">${rid.slice(0,12)}</td>
      <td><span class="badge ${drift ? 'badge-drift' : 'badge-clean'}">${drift ? 'DRIFT' : 'CLEAN'}</span></td>
      <td>${zonesHtml}</td>
      <td>${changesHtml}</td>
      <td style="color:var(--text);white-space:nowrap">${dur}</td>
      <td><button class="expand-btn" onclick="toggleDetail('${rowId}','${detailId}',this)">${isOpen ? '▲ CLOSE' : '▼ DETAILS'}</button></td>
    `;
    tbody.appendChild(tr);

    // Detail row
    const detailTr = document.createElement('tr');
    detailTr.id = detailId;
    detailTr.className = 'detail-row' + (isOpen ? ' open' : '');
    detailTr.innerHTML = `
      <td colspan="7" class="detail-cell">
        <div class="detail-grid">
          <div class="detail-item"><label>Full Run ID</label><span>${rid}</span></div>
          <div class="detail-item"><label>Timestamp (Unix)</label><span>${e.ts}</span></div>
          <div class="detail-item"><label>vSRX IP</label><span>${e.vsrx_ip || 'N/A'}</span></div>
          <div class="detail-item"><label>Total zones</label><span>${Object.keys(dmap).length}</span></div>
          <div class="detail-item"><label>New zones created</label><span>${nz.join(', ') || 'None'}</span></div>
          <div class="detail-item"><label>IPs added</label><span>${Object.values(dmap).flatMap(d=>d.to_add||[]).join(', ') || 'None'}</span></div>
          <div class="detail-item"><label>IPs removed</label><span>${Object.values(dmap).flatMap(d=>d.to_remove||[]).join(', ') || 'None'}</span></div>
          <div class="detail-item"><label>Duration</label><span>${dur}</span></div>
        </div>
      </td>
    `;
    tbody.appendChild(detailTr);
  }

  renderPagination();
}

function toggleDetail(rowId, detailId, btn) {
  const row = document.getElementById(detailId);
  if (row.classList.contains('open')) {
    row.classList.remove('open');
    openRows.delete(rowId);
    btn.textContent = '▼ DETAILS';
  } else {
    row.classList.add('open');
    openRows.add(rowId);
    btn.textContent = '▲ CLOSE';
  }
}

// ── Pagination ────────────────────────────────────────────────────────────────
function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE) || 1;
  const html  = `
    <button onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹ PREV</button>
    <span class="page-info">PAGE ${currentPage} OF ${total} (${filtered.length} RECORDS)</span>
    <button onclick="goPage(${currentPage+1})" ${currentPage>=total?'disabled':''}>NEXT ›</button>
  `;
  document.getElementById('pag-top').innerHTML    = html;
  document.getElementById('pag-bottom').innerHTML = html;
}

function goPage(p) {
  const total = Math.ceil(filtered.length / PAGE_SIZE) || 1;
  currentPage = Math.max(1, Math.min(p, total));
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ── CSV Export ────────────────────────────────────────────────────────────────
function exportCSV() {
  const cols = ['timestamp','run_id','status','vsrx_ip','zones','ips_added','ips_removed','new_zones','duration_s'];
  const rows = [cols.join(',')];

  for (const e of filtered) {
    const dmap  = e.delta_map || {};
    const added = Object.values(dmap).flatMap(d => d.to_add    || []).join(';');
    const remd  = Object.values(dmap).flatMap(d => d.to_remove || []).join(';');
    rows.push([
      new Date((e.ts||0)*1000).toISOString(),
      e.run_id  || '',
      e.changed ? 'DRIFT' : 'CLEAN',
      e.vsrx_ip || '',
      Object.keys(dmap).join(';'),
      added,
      remd,
      (e.new_zones||[]).join(';'),
      e.duration_s != null ? e.duration_s.toFixed(1) : '',
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
  }

  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `sail-audit-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`Exported ${filtered.length} records as CSV`);
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadHistory();
</script>
