server {
    listen 80;

    location / {
        root  /usr/share/nginx/html;

        # Allow Ansible to PUT topology.json over HTTP —
        # no extra tooling needed on the Morpheus side.
        dav_methods     PUT;
        create_full_put_path on;
        dav_access      user:rw group:r all:r;

        # Lets Grafana's JSON datasource GET the file directly.
        add_header Access-Control-Allow-Origin  "*";
        add_header Access-Control-Allow-Methods "GET, PUT, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";

        # Preflight requests from the browser.
        if ($request_method = OPTIONS) {
            return 204;
        }

        autoindex on;
    }
}